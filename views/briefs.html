<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Briefs - TikTok Trend Scraper</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: #09090b;
      background-image: radial-gradient(ellipse 90% 55% at 50% -5%, rgba(252,172,209,0.12) 0%, transparent 65%);
      min-height: 100vh;
      color: #fff;
    }

    .nav-toggle {
      display: inline-flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 4px;
      gap: 2px;
    }
    .nav-item {
      padding: 7px 18px;
      border-radius: 7px;
      font-size: 13.5px;
      font-weight: 500;
      color: #71717a;
      text-decoration: none;
      transition: background 0.25s ease, color 0.25s ease;
      white-space: nowrap;
      cursor: pointer;
    }
    .nav-item.active {
      background: rgba(252,172,209,0.14);
      color: #fcacd1;
    }
    .nav-item:not(.active):hover {
      color: #a1a1aa;
      background: rgba(255,255,255,0.05);
    }

    .card, .glass-card {
      background: #111113;
      border: 1px solid rgba(252,172,209,0.12);
      box-shadow: 0 0 0 1px rgba(252,172,209,0.07), 0 4px 28px rgba(0,0,0,0.5);
    }

    .brief-card {
      background: #111113;
      border: 1px solid rgba(252,172,209,0.12);
      box-shadow: 0 0 0 1px rgba(252,172,209,0.07), 0 4px 28px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .brief-card:hover {
      background: rgba(252,172,209,0.06);
      border-color: rgba(252,172,209,0.22);
      box-shadow: 0 4px 24px rgba(252,172,209,0.06);
    }

    .btn-primary, .glow-button {
      background: linear-gradient(135deg, #fcacd1 0%, #c084fc 100%);
      color: #09090b;
      font-weight: 600;
      box-shadow: 0 0 20px rgba(252,172,209,0.25);
      transition: all 0.2s ease;
      border: none;
    }
    .btn-primary:hover, .glow-button:hover {
      box-shadow: 0 0 32px rgba(252,172,209,0.45);
      transform: translateY(-1px);
    }
    .btn-primary:active, .glow-button:active { transform: translateY(0); }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: #a1a1aa;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.09);
      color: #e4e4e7;
    }

    .modal-overlay {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
    }
    .modal-content {
      background: #111113;
      border: 1px solid rgba(252,172,209,0.12);
      box-shadow: 0 0 0 1px rgba(252,172,209,0.07), 0 4px 28px rgba(0,0,0,0.5);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-animate { animation: modalIn 0.2s ease forwards; }

    .brief-content { white-space: pre-wrap; line-height: 1.65; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
  </style>
</head>
<body>
  <div class="max-w-4xl mx-auto px-6 py-10">

    <!-- Navigation -->
    <nav class="flex justify-center mb-10">
      <div class="nav-toggle">
        <a href="/" class="nav-item">Home</a>
        <span class="nav-item active">Briefs</span>
        <a href="/settings" class="nav-item">Settings</a>
      </div>
    </nav>

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.2);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="14 2 14 8 20 8" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="16" y1="13" x2="8" y2="13" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="16" y1="17" x2="8" y2="17" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round"/>
            <polyline points="10 9 9 9 8 9" stroke="#c4b5fd" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight">Generated Briefs</h1>
      </div>
      <p class="text-zinc-500 text-sm mt-1">View and manage your AI-generated creative briefs</p>
    </div>

    <!-- Briefs List -->
    <div id="briefsList" class="space-y-3">
      <p class="text-zinc-600 text-sm text-center py-8">Loading briefs...</p>
    </div>

  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal-overlay fixed inset-0 z-[60] hidden items-center justify-center p-4">
    <div class="modal-content modal-animate rounded-xl max-w-sm w-full p-6 text-center">
      <div class="w-10 h-10 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center justify-center mx-auto mb-4">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </div>
      <h3 class="text-base font-semibold mb-1">Delete Brief?</h3>
      <p class="text-zinc-500 text-sm mb-5">This action cannot be undone.</p>
      <div class="flex gap-3 justify-center">
        <button onclick="closeDeleteModal()" class="btn-ghost px-5 py-2.5 rounded-md text-sm font-medium">Cancel</button>
        <button onclick="confirmDelete()" class="px-5 py-2.5 rounded-md text-sm font-semibold bg-red-500/10 border border-red-500/25 text-red-400 hover:bg-red-500/20 transition-colors">Delete</button>
      </div>
    </div>
  </div>

  <!-- View Brief Modal -->
  <div id="viewModal" class="modal-overlay fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="modal-content modal-animate rounded-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-7">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="text-lg font-semibold">Brief</h2>
        <button onclick="closeViewModal()" class="text-zinc-500 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-md hover:bg-white/10">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="viewModalBody" class="space-y-5"></div>
    </div>
  </div>

  <script>
    let briefs = [];

    async function loadBriefs() {
      try {
        const res = await fetch('/api/briefs');
        briefs = await res.json();
        renderBriefs();
      } catch (err) {
        console.error('Error loading briefs:', err);
        document.getElementById('briefsList').innerHTML = '<p class="text-red-400 text-sm text-center">Failed to load briefs</p>';
      }
    }

    function renderBriefs() {
      const container = document.getElementById('briefsList');

      if (briefs.length === 0) {
        container.innerHTML = `
          <div class="card rounded-xl p-8 text-center">
            <div class="w-12 h-12 rounded-xl mx-auto mb-4 flex items-center justify-center" style="background: rgba(167,139,250,0.10); border: 1px solid rgba(167,139,250,0.15);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c4b5fd" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <p class="text-zinc-400 text-sm mb-4">No briefs generated yet.</p>
            <div class="text-xs text-zinc-600 space-y-1">
              <p>To generate a brief:</p>
              <p>1. Search for TikTok videos on the <a href="/" class="text-[#fcacd1] hover:underline">home page</a></p>
              <p>2. Click on a video and run "Analyze Now"</p>
              <p>3. After analysis completes, click "Generate Brief"</p>
            </div>
          </div>
        `;
        return;
      }

      container.innerHTML = briefs.map(brief => `
        <div class="brief-card rounded-lg p-5" onclick="openViewModal(${brief.id})">
          <div class="flex justify-between items-start">
            <div class="flex-1 min-w-0">
              <h3 class="text-base font-semibold text-white mb-1.5 truncate">${escapeHtml(brief.title || 'Creative Brief')}</h3>
              <div class="flex items-center gap-3 mb-1.5">
                <span class="text-[#fcacd1] text-sm font-medium">${escapeHtml(brief.project_name || 'Unknown Project')}</span>
                <span class="text-zinc-600 text-xs">${formatDate(brief.created_at)}</span>
              </div>
              <p class="text-zinc-600 text-xs">Inspired by: <a href="${brief.video_url || '#'}" target="_blank" onclick="event.stopPropagation()" class="text-zinc-400 hover:text-[#fcacd1] transition-colors">@${escapeHtml(brief.author || 'Unknown')}</a></p>
            </div>
            <button
              onclick="event.stopPropagation(); deleteBrief(${brief.id})"
              class="ml-4 px-3 py-1.5 rounded-md bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 text-red-400 transition-colors text-xs font-medium"
            >
              Delete
            </button>
          </div>
        </div>
      `).join('');
    }

    function openViewModal(briefId) {
      const brief = briefs.find(b => b.id === briefId);
      if (!brief) return;

      document.getElementById('modalTitle').textContent = brief.title || 'Creative Brief';
      document.getElementById('viewModalBody').innerHTML = `
        <div class="flex flex-wrap items-center gap-4 text-sm text-zinc-500 mb-5 pb-5 border-b border-white/6">
          <span class="text-[#fcacd1] font-medium text-sm">${escapeHtml(brief.project_name || 'Project')}</span>
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-xs">${formatDate(brief.created_at)}</span>
          </div>
          ${brief.video_url ? `
          <a href="${brief.video_url}" target="_blank" class="flex items-center gap-1.5 text-[#fcacd1] hover:underline text-xs">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            View Source Video
          </a>
          ` : ''}
        </div>

        <div class="card rounded-lg p-5">
          <div class="brief-content text-zinc-300 text-sm leading-relaxed">${escapeHtml(brief.content)}</div>
        </div>

        <div class="flex justify-end gap-3 mt-5">
          <button onclick="copyBrief(${brief.id})" class="btn-ghost px-5 py-2.5 rounded-md text-sm font-medium">
            Copy to Clipboard
          </button>
        </div>
      `;

      document.getElementById('viewModal').classList.remove('hidden');
      document.getElementById('viewModal').classList.add('flex');
    }

    function closeViewModal() {
      document.getElementById('viewModal').classList.add('hidden');
      document.getElementById('viewModal').classList.remove('flex');
    }

    let briefToDelete = null;

    function deleteBrief(briefId) {
      briefToDelete = briefId;
      document.getElementById('deleteModal').classList.remove('hidden');
      document.getElementById('deleteModal').classList.add('flex');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
      document.getElementById('deleteModal').classList.remove('flex');
      briefToDelete = null;
    }

    async function confirmDelete() {
      if (!briefToDelete) return;
      try {
        const res = await fetch(`/api/briefs/${briefToDelete}`, { method: 'DELETE' });
        if (res.ok) { closeDeleteModal(); closeViewModal(); loadBriefs(); }
      } catch (err) { console.error('Error deleting brief:', err); }
    }

    function copyBrief(briefId) {
      const brief = briefs.find(b => b.id === briefId);
      if (!brief) return;
      const btn = event.target;
      const originalText = btn.textContent;
      navigator.clipboard.writeText(brief.content).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = originalText; }, 2000);
      }).catch(err => {
        console.error('Failed to copy:', err);
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = originalText; }, 2000);
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadBriefs();
  </script>
</body>
</html>
